async function mockFetch(url, opts){
  await new Promise(r=>setTimeout(r,400));
  if(url.startsWith('/api/projects')){
  const res = await fetch('https://portfolio-k66f.onrender.com/api/projects');
  return res;
}
  if(url==='/api/skills'){
  const res = await fetch('https://portfolio-k66f.onrender.com/api/skills');
  return res;
}
  if(url==='/api/contact'&&opts?.method==='POST'){
    const body=JSON.parse(opts.body);
    const errs=[];
    if(!body.name||body.name.trim().length<2) errs.push("Name must be at least 2 characters.");
    if(!body.email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(body.email)) errs.push("A valid email is required.");
    if(!body.subject||body.subject.trim().length<3) errs.push("Subject must be at least 3 characters.");
    if(!body.message||body.message.trim().length<10) errs.push("Message must be at least 10 characters.");
    if(errs.length) return {ok:false,status:400,json:()=>Promise.resolve({success:false,errors:errs})};
    return {ok:true,status:201,json:()=>Promise.resolve({success:true,message:"Message received! I'll get back to you within 24 hours.",data:{id:Date.now()}})};
  }
  return {ok:false,status:404,json:()=>Promise.resolve({error:'Not found'})};
}

const {useState,useEffect,useRef}=React;
const e=React.createElement;

// Lucide icon helper
function Icon({name,size=16,className=''}){
  const [svg,setSvg]=useState('');
  useEffect(()=>{
    if(window.lucide&&window.lucide[name]){
      const ic=window.lucide.createElement(window.lucide[name]);
      if(ic) setSvg(ic.outerHTML||'');
    }
  },[name]);
  return e('span',{
    className:'inline-flex items-center justify-center '+className,
    style:{width:size,height:size,flexShrink:0},
    dangerouslySetInnerHTML:{__html:svg}
  });
}

function Projects(){
  const [projects,setProjects]=useState([]);
  const [activeTag,setActiveTag]=useState('All');
  const [loading,setLoading]=useState(true);

  const load=(tag)=>{
    setLoading(true);
    const url=tag&&tag!=='All'?`/api/projects?tag=${encodeURIComponent(tag)}`:'/api/projects';
    mockFetch(url).then(r=>r.json()).then(d=>setProjects(d.data||[])).finally(()=>setLoading(false));
  };
  useEffect(()=>load('All'),[]);

  const filter=(tag)=>{setActiveTag(tag);load(tag)};

  return e('section',{id:'projects',style:{padding:'96px 0',position:'relative'}},
    e('div',{style:{position:'absolute',top:0,left:0,right:0,height:1,background:'linear-gradient(90deg,transparent,rgba(51,65,85,.4),transparent)'}}),
    e('div',{style:{maxWidth:1152,margin:'0 auto',padding:'0 24px'}},
      e('div',{style:{marginBottom:40}},
        e('p',{style:{color:'#818cf8',fontSize:11,fontFamily:"'JetBrains Mono',monospace",letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:12}},'03 // work'),
        e('h2',{style:{fontSize:'clamp(1.8rem,4vw,2.5rem)',fontWeight:700,color:'#f1f5f9',margin:0}},'Projects'),
        e('p',{style:{color:'#64748b',marginTop:12,maxWidth:480}},"Things I've designed, architected, and shipped — from solo experiments to production systems.")
      ),
      e('div',{style:{marginBottom:40,overflowX:'auto',paddingBottom:8}},
        e('div',{style:{display:'flex',gap:8,minWidth:'max-content'}},
          ...ALL_TAGS.map(tag=>e('button',{key:tag,onClick:()=>filter(tag),style:{
            padding:'6px 14px',borderRadius:8,fontSize:11,fontWeight:500,fontFamily:"'JetBrains Mono',monospace",
            border:`1px solid ${activeTag===tag?'#6366f1':'rgba(51,65,85,.4)'}`,
            background:activeTag===tag?'#4f46e5':'rgba(30,42,74,.5)',
            color:activeTag===tag?'white':'#94a3b8',
            cursor:'pointer',transition:'all .2s',whiteSpace:'nowrap',
            boxShadow:activeTag===tag?'0 4px 16px rgba(99,102,241,.2)':'none'},
            onMouseEnter:ev=>{if(activeTag!==tag){ev.currentTarget.style.color='#e2e8f0';ev.currentTarget.style.borderColor='rgba(99,102,241,.3)'}},
            onMouseLeave:ev=>{if(activeTag!==tag){ev.currentTarget.style.color='#94a3b8';ev.currentTarget.style.borderColor='rgba(51,65,85,.4)'}}
          },tag))
        )
      ),
      loading
        ? e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:20}},
            ...[1,2,3,4,5,6].map(i=>e('div',{key:i,style:{height:260,borderRadius:20,background:'rgba(30,42,74,.4)'},className:'animate-pulse'}))
          )
        : projects.length===0
          ? e('div',{style:{textAlign:'center',padding:'80px 0'}},
              e('p',{style:{color:'#64748b',fontFamily:"'JetBrains Mono',monospace",fontSize:13}},`No projects found for "${activeTag}"`),
              e('button',{onClick:()=>filter('All'),style:{marginTop:16,color:'#818cf8',background:'none',border:'none',cursor:'pointer',fontSize:13,transition:'color .2s'},
                onMouseEnter:ev=>ev.currentTarget.style.color='#a5b4fc',onMouseLeave:ev=>ev.currentTarget.style.color='#818cf8'},'Clear filter')
            )
          : e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:20}},
              ...projects.map(p=>e(ProjectCard,{key:p.id,p}))
            ),
      e('div',{style:{marginTop:56,textAlign:'center'}},
        e('a',{href:'https://github.com/VanshChoudhary7/',target:'_blank',rel:'noopener noreferrer',
          style:{display:'inline-flex',alignItems:'center',gap:8,padding:'12px 24px',borderRadius:14,
            border:'1px solid rgba(51,65,85,.6)',background:'rgba(30,42,74,.4)',color:'#cbd5e1',
            fontSize:13,fontWeight:500,textDecoration:'none',transition:'all .2s'},
          onMouseEnter:ev=>{ev.currentTarget.style.color='white';ev.currentTarget.style.borderColor='rgba(51,65,85,.9)';ev.currentTarget.style.background='rgba(30,42,74,.8)'},
          onMouseLeave:ev=>{ev.currentTarget.style.color='#cbd5e1';ev.currentTarget.style.borderColor='rgba(51,65,85,.6)';ev.currentTarget.style.background='rgba(30,42,74,.4)'}},
          e(Icon,{name:'Github',size:15}),'See more on GitHub'
        )
      )
    )
  );
}

// ─── CONTACT ─────────────────────────────────────────────────────────────────
function Contact(){
  const [form,setForm]=useState({name:'',email:'',subject:'',message:''});
  const [errors,setErrors]=useState([]);
  const [status,setStatus]=useState('idle');
  const [successMsg,setSuccessMsg]=useState('');

  const onChange=ev=>{setForm(p=>({...p,[ev.target.name]:ev.target.value}));setErrors([])};

  const onSubmit=async ev=>{
    ev.preventDefault();setStatus('loading');setErrors([]);
    const r = await fetch('https://portfolio-k66f.onrender.com/api/contact', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify(form)
});
    const d=await r.json();
    if(!r.ok){setErrors(d.errors||['Something went wrong.']);setStatus('error');return;}
    setSuccessMsg(d.message);setStatus('success');setForm({name:'',email:'',subject:'',message:''});
  };

  const inp={background:'rgba(30,42,74,.5)',border:'1px solid rgba(51,65,85,.6)',color:'#f1f5f9',
    borderRadius:12,padding:'12px 16px',fontSize:13,width:'100%',outline:'none',transition:'all .2s',fontFamily:'Inter,sans-serif'};

  const contacts=[
    {icon:'Mail',label:'Email',value:'Drop a Messege',href:'mailto:workwith.vansh97@gmail.com'},
    {icon:'Linkedin',label:'LinkedIn',value:'Connect On LinkedIn',href:'https://www.linkedin.com/in/vansh-choudhary-3a1142334/'},
  ];

  return e('section',{id:'contact',style:{padding:'96px 0',position:'relative'}},
    e('div',{style:{position:'absolute',top:0,left:0,right:0,height:1,background:'linear-gradient(90deg,transparent,rgba(51,65,85,.4),transparent)'}}),
    e('div',{style:{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',width:600,height:256,background:'rgba(99,102,241,.04)',borderRadius:'50%',filter:'blur(64px)',pointerEvents:'none'}}),
    e('div',{style:{position:'relative',maxWidth:1152,margin:'0 auto',padding:'0 24px'}},
      e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:64,alignItems:'start'}},
        // Left
        e('div',{},
          e('p',{style:{color:'#818cf8',fontSize:11,fontFamily:"'JetBrains Mono',monospace",letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:12}},'04 // contact'),
          e('h2',{style:{fontSize:'clamp(1.8rem,4vw,2.5rem)',fontWeight:700,color:'#f1f5f9',marginBottom:24}},"Let's build\nsomething together."),
          e('p',{style:{color:'#94a3b8',lineHeight:1.75,marginBottom:32,fontSize:14}},'Whether you have a project in mind, want to talk engineering, or just want to connect — I\'m always up for a good conversation. I typically reply within 24 hours.'),
          e('div',{style:{display:'flex',flexDirection:'column',gap:12}},
            ...contacts.map(({icon,label,value,href})=>e('a',{key:label,href,target:'_blank',rel:'noopener noreferrer',
              style:{display:'flex',alignItems:'center',gap:16,padding:16,borderRadius:16,
                background:'rgba(15,26,61,.3)',border:'1px solid rgba(51,65,85,.4)',
                textDecoration:'none',transition:'all .2s'},
              onMouseEnter:ev=>{ev.currentTarget.style.borderColor='rgba(99,102,241,.3)';ev.currentTarget.style.background='rgba(15,26,61,.5)'},
              onMouseLeave:ev=>{ev.currentTarget.style.borderColor='rgba(51,65,85,.4)';ev.currentTarget.style.background='rgba(15,26,61,.3)'}},
              e('div',{style:{width:40,height:40,borderRadius:12,background:'rgba(99,102,241,.1)',border:'1px solid rgba(99,102,241,.2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
                e(Icon,{name:icon,size:15})
              ),
              e('div',{},
                e('p',{style:{color:'#64748b',fontSize:11,margin:0}},$label),
                e('p',{style:{color:'#e2e8f0',fontSize:13,fontWeight:500,margin:'2px 0 0'}},value)
              )
            ))
          )
        ),
        // Form
        e('div',{style:{padding:32,borderRadius:20,background:'rgba(15,26,61,.2)',border:'1px solid rgba(51,65,85,.4)'}},
          status==='success'
            ? e('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'48px 0',textAlign:'center',gap:16}},
                e('div',{style:{width:64,height:64,borderRadius:'50%',background:'rgba(52,211,153,.12)',border:'1px solid rgba(52,211,153,.3)',display:'flex',alignItems:'center',justifyContent:'center'}},
                  e(Icon,{name:'CheckCircle',size:28})
                ),
                e('div',{},
                  e('h3',{style:{color:'#f1f5f9',fontWeight:600,fontSize:17,marginBottom:8}},'Message sent!'),
                  e('p',{style:{color:'#94a3b8',fontSize:13,maxWidth:280,margin:'0 auto'}},successMsg)
                ),
                e('button',{onClick:()=>setStatus('idle'),style:{
                  marginTop:16,padding:'10px 20px',borderRadius:12,background:'#4f46e5',color:'white',fontSize:13,fontWeight:500,border:'none',cursor:'pointer',transition:'all .2s'},
                  onMouseEnter:ev=>ev.currentTarget.style.background='#6366f1',
                  onMouseLeave:ev=>ev.currentTarget.style.background='#4f46e5'},'Send another')
              )
            : e('form',{onSubmit,style:{display:'flex',flexDirection:'column',gap:16}},
                e('h3',{style:{color:'#f1f5f9',fontWeight:600,fontSize:15,margin:'0 0 4px'}},'Send a message'),
                status==='error'&&errors.length>0&&e('div',{style:{display:'flex',alignItems:'flex-start',gap:10,padding:14,borderRadius:12,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',color:'#f87171',fontSize:12}},
                  e(Icon,{name:'AlertCircle',size:14}),
                  e('div',{style:{display:'flex',flexDirection:'column',gap:4}},errors.map((er,i)=>e('span',{key:i},er)))
                ),
                e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
                  e('input',{type:'text',name:'name',placeholder:'Your name',value:form.name,onChange,required,style:inp,
                    onFocus:ev=>{ev.currentTarget.style.borderColor='rgba(99,102,241,.6)';ev.currentTarget.style.boxShadow='0 0 0 3px rgba(99,102,241,.1)';ev.currentTarget.style.background='rgba(30,42,74,.8)'},
                    onBlur:ev=>{ev.currentTarget.style.borderColor='rgba(51,65,85,.6)';ev.currentTarget.style.boxShadow='none';ev.currentTarget.style.background='rgba(30,42,74,.5)'}}),
                  e('input',{type:'email',name:'email',placeholder:'your@email.com',value:form.email,onChange,required,style:inp,
                    onFocus:ev=>{ev.currentTarget.style.borderColor='rgba(99,102,241,.6)';ev.currentTarget.style.boxShadow='0 0 0 3px rgba(99,102,241,.1)'},
                    onBlur:ev=>{ev.currentTarget.style.borderColor='rgba(51,65,85,.6)';ev.currentTarget.style.boxShadow='none'}})
                ),
                e('input',{type:'text',name:'subject',placeholder:'Subject',value:form.subject,onChange,required,style:inp,
                  onFocus:ev=>{ev.currentTarget.style.borderColor='rgba(99,102,241,.6)';ev.currentTarget.style.boxShadow='0 0 0 3px rgba(99,102,241,.1)'},
                  onBlur:ev=>{ev.currentTarget.style.borderColor='rgba(51,65,85,.6)';ev.currentTarget.style.boxShadow='none'}}),
                e('textarea',{name:'message',placeholder:'Your message…',rows:5,value:form.message,onChange,required,
                  style:{...inp,resize:'none'},
                  onFocus:ev=>{ev.currentTarget.style.borderColor='rgba(99,102,241,.6)';ev.currentTarget.style.boxShadow='0 0 0 3px rgba(99,102,241,.1)'},
                  onBlur:ev=>{ev.currentTarget.style.borderColor='rgba(51,65,85,.6)';ev.currentTarget.style.boxShadow='none'}}),
                e('button',{type:'submit',disabled:status==='loading',style:{
                  display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                  padding:'14px 24px',borderRadius:12,
                  background:status==='loading'?'rgba(79,70,229,.5)':'#4f46e5',
                  color:'white',fontWeight:600,fontSize:13,border:'none',cursor:status==='loading'?'not-allowed':'pointer',
                  transition:'all .2s',boxShadow:'0 8px 24px rgba(99,102,241,.2)'},
                  onMouseEnter:ev=>{if(status!=='loading'){ev.currentTarget.style.background='#6366f1';ev.currentTarget.style.transform='translateY(-2px)'}},
                  onMouseLeave:ev=>{if(status!=='loading'){ev.currentTarget.style.background='#4f46e5';ev.currentTarget.style.transform='translateY(0)'}}},
                  status==='loading'
                    ? [e('div',{key:'sp',style:{width:14,height:14,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'white',borderRadius:'50%'},className:'animate-spin'}),'Sending…']
                    : [e(Icon,{key:'ic',name:'Send',size:14}),'Send Message']
                )
              )
        )
      )
    )
  );
}

        e('div',{style:{width:28,height:28,borderRadius:9,background:'rgba(99,102,241,.15)',border:'1px solid rgba(99,102,241,.3)',display:'flex',alignItems:'center',justifyContent:'center'}},
          e(Icon,{name:'Terminal',size:12})
        ),
        e('span',{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:'#64748b'}},

  return e('div',{style:{minHeight:'100vh',background:'#060b18',color:'#f1f5f9'}},

    e('main',{},e(Hero),e(Skills),e(Projects),e(Contact)),

  );

ReactDOM.createRoot(document.getElementById('root')).render(e(React.StrictMode,null,e(App)));
